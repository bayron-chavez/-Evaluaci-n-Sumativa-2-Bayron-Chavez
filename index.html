<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container my-5 d-flex justify-content-center">
        <div class="card formulario-tarjeta shadow-lg p-4 p-md-5 w-100" style="max-width: 800px;">
            
            <h1 class="text-center mb-4">Registro de Usuario</h1>
            
            <form action="" id="formularioRegistro" novalidate>
            
                <h2 class="h4 mt-4 mb-3 border-bottom pb-2">Datos de la Cuenta</h2>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="usuario">Nombre Usuario:</label>
                    <input class="form-control" id="usuario" type="text" placeholder="Ej: Bayron123">
                    <div id="error-usuario" class="text-danger small mt-1"></div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="contraseña1">Contraseña:</label>
                        <div class="input-group">
                            <input class="form-control" id="contraseña1" type="password" placeholder="Tu contraseña">
                            <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center" type="button" id="btn-ver-contra1" style="width: 45px; z-index: 0;">
                                👁️
                            </button>
                        </div>
                        <div id="error-contraseña1" class="text-danger small mt-1"></div>
                    </div>
                    

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="contraseña2">Confirmar contraseña:</label>
                        <div class="input-group">
                            <input class="form-control" id="contraseña2" type="password" placeholder="Repite tu contraseña">
                            <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center" type="button" id="btn-ver-contra2" style="width: 45px; z-index: 0;">
                                👁️
                            </button>
                        </div>
                        <div id="error-contraseña2" class="text-danger small mt-1"></div>
                    </div>
                </div>

                
                <h2 class="h4 mt-4 mb-3 border-bottom pb-2">Datos Personales</h2>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="direccion">Dirección:</label>
                    <input class="form-control" id="direccion" type="text" placeholder="Calle, número, etc.">
                    <div id="error-direccion" class="text-danger small mt-1"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="pais">País:</label>
                        <select class="form-select" id="pais" name="pais">
                            <option selected disabled value="">Selecciona un país</option>
                            <option value="chile">Chile</option>
                        </select>
                        <div id="error-pais" class="text-danger small mt-1"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="ciudad">Ciudad:</label>
                        <select class="form-select" id="ciudad" name="ciudad">
                            <option selected disabled value="">Selecciona una ciudad</option>
                            <option value="santiago">Santiago</option>
                            <option value="valparaiso">Valparaíso</option>
                            <option value="concepcion">Concepción</option>
                            <option value="la-serena">La Serena</option>
                            <option value="iquique">Iquique</option>
                            <option value="antofagasta">Antofagasta</option>
                            <option value="talca">Talca</option>
                            <option value="temuco">Temuco</option>
                            <option value="puerto-montt">Puerto Montt</option>
                            <option value="chiloe">Chiloé</option>
                            <option value="araucania">Angol</option>
                            <option value="copiapo">Copiapó</option>
                            <option value="rancagua">Rancagua</option>
                            <option value="arica">Arica</option>
                            <option value="osorno">Osorno</option>
                            <option value="curico">Curicó</option>
                            <option value="punta-arenas">Punta Arenas</option>
                            <option value="copihue">Chillán</option>
                            <option value="valdivia">Valdivia</option>
                            </select>
                        <div id="error-ciudad" class="text-danger small mt-1"></div>
                    </div>
                </div>
            
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="correo1">Correo Electrónico:</label>
                        <input class="form-control" id="correo1" type="text" placeholder="ejemplo@correo.com">
                        <div id="error-correo1" class="text-danger small mt-1"></div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="numero-telefono">Número de Teléfono:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">+56</span>
                            <input class="form-control" id="numero-telefono" type="text" placeholder="912345678">
                        </div>
                        <div id="error-telefono" class="text-danger small mt-1"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="urlPersonal">URL personal:</label>
                        <input class="form-control" id="urlPersonal" type="text" placeholder="https://www.ejemplo.com">
                        <div id="error-url" class="text-danger small mt-1"></div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="codigo-postal">Código Postal:</label>
                        <input class="form-control" id="codigo-postal" type="text" placeholder="Ej: 5090000">
                        <div id="error-codigo-postal" class="text-danger small mt-1"></div>
                    </div>
                </div>

                <div class="mb-4 mt-3 bg-light p-3 rounded-3 border">
                    <label class="form-label fw-bold text-primary mb-3">Aficiones y pasatiempos:</label>
                    <div class="d-flex flex-wrap gap-3"> <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="aficion-lectura" name="aficiones" value="Lectura">
                            <label class="form-check-label" for="aficion-lectura">Lectura</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="aficion-deporte" name="aficiones" value="Deporte">
                            <label class="form-check-label" for="aficion-deporte">Deporte</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="aficion-musica" name="aficiones" value="Música">
                            <label class="form-check-label" for="aficion-musica">Música</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="aficion-viajar" name="aficiones" value="Viajar">
                            <label class="form-check-label" for="aficion-viajar">Viajar</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="aficion-tecnologia" name="aficiones" value="Tecnología">
                            <label class="form-check-label" for="aficion-tecnologia">Tecnología</label>
                        </div>
                    </div>
                    <div id="error-aficiones" class="text-danger small mt-2"></div>
                </div>

                <button type="submit" class="btn btn-enviar btn-primary w-100 mt-2 fs-5">🔥 Completar Registro 🔥</button>
                
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>

</body>
</html>
